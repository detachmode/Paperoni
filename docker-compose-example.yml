services:
  paperoni:
    image: ghcr.io/detachmode/paperoni:latest
    restart: on-failure:3
    environment:
      Telegram__BotToken: "${Telegram__BotToken:?Telegram__BotToken is required}"

      # Local LLM endpoint (example: llama.cpp server)
      Ai__Endpoint: "http://host.docker.internal:2276"
      Ai__Model: "qwen-3.6-35b-a3b-q4"

      # Cloud LLM (uncomment and configure):
      #      Ai__ApiKey: "<your api key>"
      #      Ai__Endpoint: "https://opencode.ai/zen/go/v1"
      #      Ai__Model: "qwen3.6-plus"

      AlbumProcessing__MarkdownOutputPath: /output/markdown
      AlbumProcessing__PdfOutputPath: /output/pdf
      AlbumProcessing__TestModeOutputPath: /data/test-output
      AlbumProcessing__WorkingDirectoryRetentionDays: "7"
      PaperoniWorkingDirectory: /data
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./workingDir:/data
      - ./output/markdown:/output/markdown
      - ./output/pdf:/output/pdf

# Mount your own custom pipeline.csx file in case you want to modify the pipeline (Prompt, final Markdown structure, etc)
#      - ./pipeline.csx:/app/defaultPipeline.csx:ro

