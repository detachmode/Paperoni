name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      major: ${{ steps.version.outputs.major }}
      major_minor: ${{ steps.version.outputs.major_minor }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          SHORT_SHA=${GITHUB_SHA::7}
          PREV_VERSION=$(git show HEAD~1:Directory.Build.props 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")

          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          if [ "$VERSION" != "$PREV_VERSION" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
            echo "major_minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT
          else
            echo "version=$VERSION-pre.$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  test:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    env:
      HAS_AI_KEY: ${{ secrets.AI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Run unit tests
        run: dotnet test test/Paperoni.Tests/Paperoni.Tests.csproj
      - name: Run RealAI tests
        if: env.HAS_AI_KEY == 'true'
        run: dotnet test test/Paperoni.RealAi.Tests/Paperoni.RealAi.Tests.csproj
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_ENDPOINT: https://models.github.ai/inference
          AI_MODEL: gpt-4o-mini

