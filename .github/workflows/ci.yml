  docker:
    needs: [ test, version ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: docker_tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/paperoni"
          TAGS="$REPO:latest"$'\n'"$REPO:sha-${{ needs.version.outputs.short_sha }}"$'\n'"$REPO:${{ needs.version.outputs.version }}"
          if [ "${{ needs.version.outputs.is_release }}" = "true" ]; then
            TAGS="$TAGS"$'\n'"$REPO:${{ needs.version.outputs.major }}"$'\n'"$REPO:${{ needs.version.outputs.major_minor }}"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Build Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          tags: paperoni:smoke
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            GIT_SHA=${{ needs.version.outputs.short_sha }}

      - name: Smoke test Docker container
        run: |
          set -o pipefail
          set +e
          timeout 10s docker run --rm \
            -e SmokeTestInPipeline=true \
            -e Telegram__BotToken=fake-token \
            -e AlbumProcessing__MarkdownOutputPath=/tmp/markdown \
            -e AlbumProcessing__PdfOutputPath=/tmp/pdf \
            paperoni:smoke --version 2>&1 | tee smoke-test.log
          DOCKER_EXIT=${PIPESTATUS[0]}
          set -e

          if grep -Eiq "error|exception|failed" smoke-test.log; then
            echo "Smoke test failed: found error output"
            exit 1
          fi

          if [ "$DOCKER_EXIT" -ne 0 ] && [ "$DOCKER_EXIT" -ne 124 ]; then
            echo "Smoke test failed: docker run exited with code $DOCKER_EXIT"
            exit "$DOCKER_EXIT"
          fi

          if [ "$DOCKER_EXIT" -eq 124 ]; then
            echo "Smoke test reached 30s timeout without errors (expected)."
          fi

      - name: Publish multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker_tags.outputs.tags }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            GIT_SHA=${{ needs.version.outputs.short_sha }}

  release:
    needs:
      - test
      - version
#      - publish-binaries # will be needed later again
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: Paperoni-*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            Paperoni-win-x64/Paperoni-${{ needs.version.outputs.version }}-win-x64.zip
            Paperoni-linux-x64/Paperoni-${{ needs.version.outputs.version }}-linux-x64.zip
            Paperoni-linux-arm64/Paperoni-${{ needs.version.outputs.version }}-linux-arm64.zip
            Paperoni-osx-arm64/Paperoni-${{ needs.version.outputs.version }}-osx-arm64.zip
