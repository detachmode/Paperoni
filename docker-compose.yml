services:
  paperoni:
    image: ghcr.io/detachmode/paperoni:latest
    restart: on-failure:3
    environment:
      Telegram__BotToken: "${Telegram__BotToken:?Telegram__BotToken is required}"
      Ai__ApiKey: "${Ai__ApiKey:-}"
      Ai__Endpoint: "${AI__ENDPOINT:-http://host.docker.internal:2276}"
      Ai__Model: "${AI__MODEL:-qwen-3.6-35b-a3b-q4}"
      AlbumProcessing__MarkdownOutputPath: /output/markdown
      AlbumProcessing__FilePublisherOutputPath: /output/pdf
      AlbumProcessing__TestModeOutputPath: /data/test-output
      DownloadBasePath: /data/downloads
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - paperoni_data:/data
      - ./output/markdown:/output/markdown
      - ./output/pdf:/output/pdf
      - ./src/Paperoni/Prompt.md:/app/Prompt.md:ro

volumes:
  paperoni_data:
